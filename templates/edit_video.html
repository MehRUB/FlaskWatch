{% extends 'base.html' %}
{% block title %}Edit Video - FlaskTube{% endblock %}
{% block content %}
<div class="form-page">
  <div class="edit-channel-header">
    <h2>Edit Video</h2>
    <a href="{{ url_for('studio') }}" class="back-link">← Back to Studio</a>
  </div>

  <form method="post" enctype="multipart/form-data" class="edit-channel-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" name="title" id="title" class="form-input" value="{{ video.title }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description" class="form-input" rows="5">{{ video.description }}</textarea>
    </div>
    
    <div class="form-group">
      <label for="tags">Tags <span class="hint">(comma-separated)</span></label>
      <input type="text" name="tags" id="tags" class="form-input" value="{{ video.tags }}">
    </div>

    <div class="form-group">
      <label>Current Thumbnail</label>
      {% if video.thumbnail %}
        <img src="{{ url_for('uploaded_file', filename=video.thumbnail) }}" alt="Current thumbnail" style="max-width: 240px; border-radius: 8px; display: block; margin-bottom: 16px;">
      {% else %}
        <p class="field-hint">No thumbnail set.</p>
      {% endif %}
      
      <label>Upload New Thumbnail</label>
      <div class="upload-zone">
        <input type="file" name="thumbnail" id="thumbnail" class="upload-zone-input" accept="image/*">
        <div class="upload-zone-content">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--text2)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/></svg>
          <p class="upload-zone-text">Click to upload or drag and drop</p>
          <p class="upload-zone-hint">SVG, PNG, JPG or GIF (max. 2MB)</p>
          <p class="upload-zone-filename" id="thumb-filename"></p>
        </div>
      </div>

      <div id="thumbnail-generator-edit" style="margin-top: 16px;">
        <button type="button" id="generate-thumb-btn" class="btn btn-neutral" data-video-url="{{ url_for('uploaded_file', filename=video.filename) }}">
          Generate from video
        </button>
        <div class="generated-thumbs-grid" id="generated-thumbs-grid-edit" style="margin-top: 12px;"></div>
      </div>
    </div>

    <div class="form-group">
      <label for="visibility">Visibility</label>
      <select name="visibility" id="visibility" class="form-input">
        <option value="public" {% if video.visibility == 'public' %}selected{% endif %}>Public</option>
        <option value="unlisted" {% if video.visibility == 'unlisted' %}selected{% endif %}>Unlisted</option>
        <option value="private" {% if video.visibility == 'private' %}selected{% endif %}>Private</option>
        <option value="scheduled" {% if video.visibility == 'scheduled' %}selected{% endif %}>Scheduled</option>
      </select>
    </div>

    <div class="form-group" id="scheduled-at-group" style="display: {% if video.visibility == 'scheduled' %}'block'{% else %}'none'{% endif %};">
      <label for="scheduled_at">Scheduled Time</label>
      <input type="datetime-local" name="scheduled_at" id="scheduled_at" class="form-input" value="{{ video.scheduled_at.replace(' ', 'T') if video.scheduled_at else '' }}">
    </div>

    <div class="form-actions">
      <a href="{{ url_for('studio') }}" class="cancel-btn">Cancel</a>
      <button type="submit" class="submit-btn" style="width: auto;">Save Changes</button>
    </div>
  </form>
</div>

<script>
document.getElementById('visibility').addEventListener('change', function() {
  document.getElementById('scheduled-at-group').style.display = this.value === 'scheduled' ? 'block' : 'none';
});
</script>
{% endblock %}
